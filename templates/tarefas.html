<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    .top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

#btn-logout {
  background: rgba(200, 240, 96, 0.12);
  border: 1px solid rgba(200, 240, 96, 0.4);
  color: #c8f060;

  padding: 8px 14px;
  border-radius: 8px;

  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

#btn-logout:hover {
  background: #c8f060;
  color: #0d0d0f;
  transform: translateY(-1px);
}
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #161619;
      --surface2: #1e1e23;
      --border: #2a2a32;
      --accent: #c8f060;
      --accent-dim: rgba(200, 240, 96, 0.12);
      --accent-dim2: rgba(200, 240, 96, 0.06);
      --text: #f0f0f2;
      --text-sub: #7a7a8a;
      --text-muted: #44444e;
      --red: #ff5c5c;
      --red-dim: rgba(255, 92, 92, 0.1);
      --blue: #5cb8ff;
      --blue-dim: rgba(92, 184, 255, 0.1);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* BACKGROUND GLOW */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(200,240,96,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      margin-bottom: 48px;
      animation: fadeDown 0.5s ease both;
    }

    .header-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 6vw, 52px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }

    header h1 span {
      color: var(--accent);
    }

    .header-sub {
      margin-top: 15px;
      margin-bottom: 28px;
      font-size: 18px;
      color: var(--text-sub);
      font-weight: 300;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      animation: fadeDown 0.5s 0.1s ease both;
    }

    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      text-align: center;
    }

    .stat-number {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* FORM */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
      animation: fadeDown 0.5s 0.15s ease both;
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 16px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .input-group {
      position: relative;
    }

    .input-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-group input::placeholder {
      color: var(--text-muted);
    }

    .input-group input:focus {
      border-color: var(--accent);
      background: rgba(200, 240, 96, 0.04);
    }

    .btn-add {
      width: 100%;
      margin-top: 4px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 13px 20px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* FILTER TABS */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      animation: fadeDown 0.5s 0.2s ease both;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-sub);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* SECTION HEADER */
    .section-header {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* TASK LIST */
    #lista-tarefas {
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeDown 0.5s 0.25s ease both;
    }

    /* TASK CARD */
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s, background 0.2s;
      animation: slideIn 0.3s ease both;
    }

    .task-card:hover {
      border-color: #383844;
      background: #18181c;
    }

    .task-card.concluida {
      opacity: 0.5;
    }

    .task-card.concluida .task-title {
      text-decoration: line-through;
      color: var(--text-sub);
    }

    /* STATUS DOT */
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .task-card.concluida .status-dot {
      background: var(--text-muted);
      box-shadow: none;
    }

    .task-body {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-desc {
      font-size: 13px;
      color: var(--text-sub);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-status-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--accent-dim2);
      color: var(--accent);
      flex-shrink: 0;
    }

    .task-card.concluida .task-status-badge {
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
    }

    /* ACTION BUTTONS */
    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .action-btn {
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }

    .action-btn:hover { opacity: 0.8; transform: translateY(-1px); }
    .action-btn:active { transform: translateY(0); }

    .btn-edit {
      background: var(--blue-dim);
      color: var(--blue);
    }

    .btn-delete {
      background: var(--red-dim);
      color: var(--red);
    }

    .btn-done {
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    /* MODAL OVERLAY */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
      transform: translateY(10px) scale(0.98);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .modal-input:focus { border-color: var(--accent); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .btn-modal-cancel {
      flex: 1;
      padding: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-sub);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-modal-cancel:hover { background: var(--border); }

    .btn-modal-save {
      flex: 1;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #0d0d0f;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-modal-save:hover { opacity: 0.85; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      z-index: 200;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.error { border-color: var(--red); color: var(--red); }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .task-actions { flex-direction: column; }
      .action-btn { padding: 6px 8px; font-size: 11px; }
      .task-status-badge { display: none; }
    }
  </style>
</head>
<body>

  <div class="app">

    <!-- HEADER COM LOGOUT -->
    <div class="top-bar">
      <div>
        <div class="header-label">Gerenciador</div>
        <h1>Minhas <span>Tarefas</span></h1>
      </div>
      <button id="btn-logout">🚪 Sair</button>
    </div>

    <p class="header-sub">Organize, acompanhe e conclua com facilidade.</p>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="stat-pendente">0</div>
        <div class="stat-label">Pendentes</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="stat-concluida">0</div>
        <div class="stat-label">Concluídas</div>
      </div>
    </div>

    <!-- FORM -->
    <div class="form-card">
      <div class="form-title">Nova Tarefa</div>
      <div class="form-row">
        <div class="input-group">
          <input type="text" id="input-titulo" placeholder="Título da tarefa">
        </div>
        <div class="input-group">
          <input type="text" id="input-descricao" placeholder="Descrição (opcional)">
        </div>
        <button class="btn-add" id="btn-add">+ Adicionar Tarefa</button>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="filter-row">
      <button class="filter-btn active" data-filter="todas">Todas</button>
      <button class="filter-btn" data-filter="pendente">Pendentes</button>
      <button class="filter-btn" data-filter="concluida">Concluídas</button>
    </div>

    <!-- LISTA -->
    <div class="section-header" id="section-count">Carregando...</div>
    <div id="lista-tarefas"></div>

  </div>

  <!-- MODAL EDITAR -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">Editar Tarefa</div>
      <input class="modal-input" type="text" id="modal-titulo" placeholder="Título">
      <input class="modal-input" type="text" id="modal-descricao" placeholder="Descrição">
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="modal-cancel">Cancelar</button>
        <button class="btn-modal-save" id="modal-save">Salvar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="/static/js/tarefas.js"></script>

</body>
</html>
