<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #161619;
      --surface2: #1e1e23;
      --border: #2a2a32;
      --accent: #c8f060;
      --accent-dim: rgba(200, 240, 96, 0.12);
      --text: #f0f0f2;
      --text-sub: #7a7a8a;
      --text-muted: #44444e;
      --red: #ff5c5c;
      --red-dim: rgba(255, 92, 92, 0.1);
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* GLOW DE FUNDO */
    body::before {
      content: '';
      position: fixed;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(200,240,96,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* GRADE SUTIL */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    /* LOGO / MARCA */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--accent-dim);
      border: 1px solid rgba(200,240,96,0.3);
      border-radius: 12px;
      font-size: 22px;
      margin-bottom: 16px;
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand h1 span { color: var(--accent); }

    .brand p {
      margin-top: 6px;
      font-size: 14px;
      color: var(--text-sub);
      font-weight: 300;
    }

    /* CARD */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .field input::placeholder { color: var(--text-muted); }

    .field input:focus {
      border-color: var(--accent);
      background: rgba(200, 240, 96, 0.04);
    }

    .field input.erro {
      border-color: var(--red);
      background: var(--red-dim);
    }

    /* MENSAGEM DE ERRO */
    .erro-msg {
      display: none;
      font-size: 13px;
      color: var(--red);
      margin-top: 6px;
      padding: 10px 14px;
      background: var(--red-dim);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,92,92,0.2);
    }

    .erro-msg.visivel { display: block; }

    /* BOTÃO */
    .btn-login {
      width: 100%;
      margin-top: 8px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 14px 20px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* SPINNER */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(13,13,15,0.3);
      border-top-color: #0d0d0f;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn-login.carregando .spinner { display: block; }
    .btn-login.carregando .btn-text { display: none; }

    /* FOOTER DO CARD */
    .card-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-sub);
    }

    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .card-footer a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <div class="brand">
      <div class="brand-icon">✦</div>
      <h1>Minhas <span>Tarefas</span></h1>
      <p>Entre para acessar suas tarefas</p>
    </div>

    <div class="login-card">

      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
      </div>

      <div class="erro-msg" id="erro-msg">E-mail ou senha inválidos.</div>

      <button class="btn-login" id="btn-login">
        <span class="btn-text">Entrar</span>
        <div class="spinner"></div>
      </button>

      <div class="card-footer">
        Não tem uma conta? <a href="/registro">Registre-se</a>
      </div>

    </div>

  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
